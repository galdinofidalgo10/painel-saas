<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: white;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: #020617;
    position: fixed;
    padding: 20px;
}

.sidebar a {
    display: block;
    color: #94a3b8;
    text-decoration: none;
    margin-bottom: 15px;
}

.sidebar a:hover {
    color: white;
}

.content {
    margin-left: 240px;
    padding: 20px;
}

.card {
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h4>Painel SaaS</h4>
    <a href="/">Dashboard</a>
    <a href="/usuarios">Usuários</a>
    <a href="/pagamentos">Pagamentos</a>
    <a href="/logout">Sair</a>
</div>

<div class="content">

    <h2>Dashboard</h2>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card bg-dark p-3">
                <h5>Usuários</h5>
                <h2>120</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark p-3">
                <h5>Consultas</h5>
                <h2>450</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark p-3">
                <h5>Receita</h5>
                <h2>R$ 1.200</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
