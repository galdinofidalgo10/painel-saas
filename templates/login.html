<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Painel SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    border-radius: 15px;
    padding: 30px;
    background: #fff;
    width: 100%;
    max-width: 400px;
}

.title {
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="card shadow">
    <h3 class="title">Painel SaaS</h3>

    <form method="POST">
        <input name="username" placeholder="Usuário" class="form-control mb-3" required>
        <input type="password" name="password" placeholder="Senha" class="form-control mb-3" required>
        <button class="btn btn-dark w-100">Entrar</button>
    </form>
</div>

</body>
</html>
